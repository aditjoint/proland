<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave & License Agreement - FIXED VERSION</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Times New Roman', serif; max-width: 1400px; margin: 0 auto; padding: 20px; background: #f8f9fa; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .state-tabs { display: flex; background: #007bff; border-radius: 8px 8px 0 0; overflow: hidden; margin-bottom: 0; flex-wrap: wrap; }
        .tab-btn { flex: 1; min-width: 140px; padding: 15px; background: none; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 16px; transition: background 0.3s; }
        .tab-btn:hover { background: #0056b3; }
        .tab-btn.active { background: #0056b3; }
        .tab-content { display: none; padding-top: 20px; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 20px; }
        .form-group h3 { margin-bottom: 10px; border-bottom: 1px solid #ddd; padding-bottom: 5px; color: #007bff; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 5px; font-size: 16px; font-family: inherit; margin-bottom: 8px; box-sizing: border-box; }
        input:focus, select:focus, textarea:focus { border-color: #007bff; outline: none; box-shadow: 0 0 5px rgba(0,123,255,0.3); }
        .btn { background: #28a745; color: white; padding: 15px 30px; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin: 10px 5px; transition: background 0.3s; display: inline-block; }
        .btn:hover { background: #218838; }
        .btn-secondary { background: #6c757d; }
        .btn-secondary:hover { background: #5a6268; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #c82333; }
        .preview { border: 2px solid #007bff; padding: 20px; margin-top: 20px; background: #f8f9ff; min-height: 500px; overflow-y: auto; display: none; }
        .preview.show { display: block; }
        .print-area { font-family: 'Times New Roman', serif; font-size: 12pt; line-height: 1.6; }
        .print-header { text-align: center; font-size: 18pt; font-weight: bold; margin-bottom: 30px; page-break-after: avoid; }
        .no-commercial-box { background: #fff3cd; border: 4px solid #ffc107; padding: 20px; margin: 20px 0; border-radius: 8px; }
        .owner-protection-box { background: #e8f5e8; border: 3px solid #28a745; padding: 20px; margin: 20px 0; border-radius: 8px; }
        table.print-table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        table.print-table th, table.print-table td { border: 1px solid #333; padding: 8px; text-align: left; }
        .fill-line { border-bottom: 2px solid #000; min-height: 25px; display: inline-block; width: 100%; margin: 5px 0; }
        .signature-section { margin-top: 60px; page-break-inside: avoid; }
        .prohibited-uses { background: #f8d7da; border-left: 5px solid #dc3545; padding: 15px; margin: 15px 0; }
        .statutory-warning { background: #fff3cd; border-left: 5px solid #ffc107; padding: 15px; margin: 15px 0; font-weight: bold; }
        @media print {
            body * { visibility: hidden; }
            .print-area, .print-area * { visibility: visible; }
            .print-area { position: absolute; left: 0; top: 0; width: 100%; }
            body { background: white !important; padding: 0; margin: 0; }
        }
        @page { margin: 0.75in; size: A4; }
        .state-safe { border-left: 5px solid #28a745; }
        .error { color: #dc3545; background: #f8d7da; padding: 10px; border-radius: 5px; margin: 10px 0; display: none; }
    </style>
</head>
<body>

<div class="container state-safe">
    <h1>🏠 Leave & License Agreement - ALL STATES FIXED ✅</h1>
    <p><strong>🚫 STRICT RESIDENTIAL ONLY • NO COMMERCIAL/GST/MSME • Working tabs & PDF</strong></p>

    <div class="state-tabs">
        <button class="tab-btn active" data-state="maharashtra">🇲🇭 MAHARASHTRA</button>
        <button class="tab-btn" data-state="goa">🇬🇴 GOA</button>
        <button class="tab-btn" data-state="odisha">🇴🇩 ODISHA</button>
        <button class="tab-btn" data-state="gujarat">🇬🇯 GUJARAT</button>
    </div>

    <!-- ERROR DISPLAY -->
    <div id="error-display" class="error"></div>

    <!-- MAHARASHTRA FORM -->
    <div id="maharashtra" class="tab-content active">
        <div class="form-group">
            <label>Date:</label>
            <input type="date" id="mh_date">
        </div>
        <div class="form-group">
            <h3>LICENSOR (OWNER)</h3>
            <input type="text" id="mh_licensor_name" placeholder="Full Name">
            <input type="text" id="mh_licensor_father" placeholder="Father's/Spouse's Name">
            <input type="text" id="mh_licensor_address" placeholder="Permanent Address">
            <input type="text" id="mh_licensor_pan" placeholder="PAN Number">
        </div>
        <div class="form-group">
            <h3>LICENSEE</h3>
            <input type="text" id="mh_licensee_name" placeholder="Full Name">
            <input type="text" id="mh_licensee_father" placeholder="Father's/Spouse's Name">
            <input type="text" id="mh_licensee_aadhaar" placeholder="Aadhaar Number">
        </div>
        <div class="form-group">
            <h3>PROPERTY</h3>
            <input type="text" id="mh_flat" placeholder="Flat/Apartment No.">
            <input type="text" id="mh_address" placeholder="Complete Address">
            <input type="number" id="mh_license_fee" placeholder="Monthly Fee (₹)">
            <input type="number" id="mh_deposit" placeholder="Deposit (₹)">
        </div>
        <button class="btn" onclick="generatePreview('maharashtra')">🎨 GENERATE PDF</button>
        <button class="btn btn-secondary" onclick="clearForm('maharashtra')">🗑️ CLEAR</button>
    </div>

    <!-- GOA FORM -->
    <div id="goa" class="tab-content">
        <div class="form-group">
            <label>Date:</label>
            <input type="date" id="go_date">
        </div>
        <div class="form-group">
            <h3>LICENSOR (OWNER)</h3>
            <input type="text" id="go_licensor_name" placeholder="Full Name">
            <input type="text" id="go_licensor_father" placeholder="Father's/Spouse's Name">
            <input type="text" id="go_licensor_address" placeholder="Permanent Address">
            <input type="text" id="go_licensor_pan" placeholder="PAN Number">
        </div>
        <div class="form-group">
            <h3>LICENSEE</h3>
            <input type="text" id="go_licensee_name" placeholder="Full Name">
            <input type="text" id="go_licensee_father" placeholder="Father's/Spouse's Name">
            <input type="text" id="go_licensee_aadhaar" placeholder="Aadhaar Number">
        </div>
        <div class="form-group">
            <h3>PROPERTY</h3>
            <input type="text" id="go_flat" placeholder="Flat/Apartment No.">
            <input type="text" id="go_address" placeholder="Complete Address">
            <input type="number" id="go_license_fee" placeholder="Monthly Fee (₹)">
            <input type="number" id="go_deposit" placeholder="Deposit (₹)">
        </div>
        <button class="btn" onclick="generatePreview('goa')">🎨 GENERATE PDF</button>
        <button class="btn btn-secondary" onclick="clearForm('goa')">🗑️ CLEAR</button>
    </div>

    <!-- ODISHA FORM -->
    <div id="odisha" class="tab-content">
        <div class="form-group">
            <label>Date:</label>
            <input type="date" id="od_date">
        </div>
        <div class="form-group">
            <h3>LICENSOR (OWNER)</h3>
            <input type="text" id="od_licensor_name" placeholder="Full Name">
            <input type="text" id="od_licensor_father" placeholder="Father's/Spouse's Name">
            <input type="text" id="od_licensor_address" placeholder="Permanent Address">
            <input type="text" id="od_licensor_pan" placeholder="PAN Number">
        </div>
        <div class="form-group">
            <h3>LICENSEE</h3>
            <input type="text" id="od_licensee_name" placeholder="Full Name">
            <input type="text" id="od_licensee_father" placeholder="Father's/Spouse's Name">
            <input type="text" id="od_licensee_aadhaar" placeholder="Aadhaar Number">
        </div>
        <div class="form-group">
            <h3>PROPERTY</h3>
            <input type="text" id="od_flat" placeholder="Flat/Apartment No.">
            <input type="text" id="od_address" placeholder="Complete Address">
            <input type="number" id="od_license_fee" placeholder="Monthly Fee (₹)">
            <input type="number" id="od_deposit" placeholder="Deposit (₹)">
        </div>
        <button class="btn" onclick="generatePreview('odisha')">🎨 GENERATE PDF</button>
        <button class="btn btn-secondary" onclick="clearForm('odisha')">🗑️ CLEAR</button>
    </div>

    <!-- GUJARAT FORM -->
    <div id="gujarat" class="tab-content">
        <div class="form-group">
            <label>Date:</label>
            <input type="date" id="gj_date">
        </div>
        <div class="form-group">
            <h3>LICENSOR (OWNER)</h3>
            <input type="text" id="gj_licensor_name" placeholder="Full Name">
            <input type="text" id="gj_licensor_father" placeholder="Father's/Spouse's Name">
            <input type="text" id="gj_licensor_address" placeholder="Permanent Address">
            <input type="text" id="gj_licensor_pan" placeholder="PAN Number">
        </div>
        <div class="form-group">
            <h3>LICENSEE</h3>
            <input type="text" id="gj_licensee_name" placeholder="Full Name">
            <input type="text" id="gj_licensee_father" placeholder="Father's/Spouse's Name">
            <input type="text" id="gj_licensee_aadhaar" placeholder="Aadhaar Number">
        </div>
        <div class="form-group">
            <h3>PROPERTY</h3>
            <input type="text" id="gj_flat" placeholder="Flat/Apartment No.">
            <input type="text" id="gj_address" placeholder="Complete Address">
            <input type="number" id="gj_license_fee" placeholder="Monthly Fee (₹)">
            <input type="number" id="gj_deposit" placeholder="Deposit (₹)">
        </div>
        <button class="btn" onclick="generatePreview('gujarat')">🎨 GENERATE PDF</button>
        <button class="btn btn-secondary" onclick="clearForm('gujarat')">🗑️ CLEAR</button>
    </div>
</div>

<!-- PREVIEW AREA -->
<div class="container preview" id="preview-container">
    <div style="margin-bottom: 15px;">
        <button class="btn btn-danger" onclick="printDocument()" style="float:right;">🖨️ PRINT/SAVE PDF</button>
        <button class="btn btn-secondary" onclick="hidePreview()">✕ CLOSE PREVIEW</button>
    </div>
    <div id="print-area" class="print-area"></div>
</div>

<script>
const stateConfig = {
    maharashtra: {
        title: 'MAHARASHTRA - RESIDENTIAL LEAVE & LICENSE',
        subtitle: 'STRICTLY RESIDENTIAL - NO COMMERCIAL/GST/MSME',
        place: 'Mumbai',
        registration: 'https://efilingigr.maharashtra.gov.in'
    },
    goa: {
        title: 'GOA - RESIDENTIAL LEAVE & LICENSE',
        subtitle: 'RESIDENTIAL USE ONLY - NO BUSINESS ACTIVITY',
        place: 'Panaji',
        registration: 'Sub-Registrar Office, Goa'
    },
    odisha: {
        title: 'ODISHA - RESIDENTIAL LEAVE & LICENSE',
        subtitle: 'PERSONAL RESIDENCE ONLY - NO COMMERCIAL USE',
        place: 'Bhubaneswar',
        registration: 'Inspector General of Registration, Odisha'
    },
    gujarat: {
        title: 'GUJARAT - RESIDENTIAL LEAVE & LICENSE',
        subtitle: 'STRICTLY RESIDENTIAL - NO GST/MSME',
        place: 'Ahmedabad',
        registration: 'Garvi Portal / Sub-Registrar'
    }
};

// 🔥 FIXED TAB SWITCHING
document.addEventListener('DOMContentLoaded', function() {
    // Auto-fill dates
    document.querySelectorAll('input[type="date"]').forEach(input => {
        if (!input.value) input.valueAsDate = new Date();
    });

    // Tab event listeners
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const state = this.dataset.state;
            switchTab(state);
        });
    });
});

function switchTab(state) {
    // Remove active from all
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    
    // Add active to selected
    document.getElementById(state).classList.add('active');
    document.querySelector(`[data-state="${state}"]`).classList.add('active');
}

function showError(msg) {
    const errorDiv = document.getElementById('error-display');
    errorDiv.textContent = msg;
    errorDiv.style.display = 'block';
    setTimeout(() => errorDiv.style.display = 'none', 5000);
}

function clearForm(state) {
    const prefix = getPrefix(state);
    document.querySelectorAll(`#${state} input, #${state} select`).forEach(el => {
        if (el.type === 'date') el.valueAsDate = new Date();
        else el.value = '';
    });
}

function getPrefix(state) {
    const prefixes = { maharashtra: 'mh_', goa: 'go_', odisha: 'od_', gujarat: 'gj_' };
    return prefixes[state] || '';
}

function generatePreview(state) {
    try {
        const data = getFormData(state);
        if (!data.licensor_name || !data.licensee_name || !data.address) {
            showError('Please fill Licensor Name, Licensee Name, and Address first!');
            return;
        }
        
        const html = generateAgreementHTML(state, data);
        document.getElementById('print-area').innerHTML = html;
        document.getElementById('preview-container').scrollIntoView({ behavior: 'smooth' });
    } catch (e) {
        showError('Error generating preview: ' + e.message);
    }
}

function getFormData(state) {
    const prefix = getPrefix(state);
    return {
        date: document.getElementById(prefix + 'date')?.value || new Date().toISOString().split('T')[0],
        licensor_name: document.getElementById(prefix + 'licensor_name')?.value || '__________________',
        licensor_father: document.getElementById(prefix + 'licensor_father')?.value || '__________________',
        licensor_address: document.getElementById(prefix + 'licensor_address')?.value || '__________________',
        licensor_pan: document.getElementById(prefix + 'licensor_pan')?.value || '__________________',
        licensee_name: document.getElementById(prefix + 'licensee_name')?.value || '__________________',
        licensee_father: document.getElementById(prefix + 'licensee_father')?.value || '__________________',
        licensee_aadhaar: document.getElementById(prefix + 'licensee_aadhaar')?.value || '__________________',
        flat: document.getElementById(prefix + 'flat')?.value || '__________________',
        address: document.getElementById(prefix + 'address')?.value || '__________________',
        license_fee: document.getElementById(prefix + 'license_fee')?.value || '__________',
        deposit: document.getElementById(prefix + 'deposit')?.value || '__________'
    };
}

function generateAgreementHTML(state, data) {
    const config = stateConfig[state];
    
    return `
        <div class="print-header">
            <h1>${config.title}</h1>
            <p><strong>${config.subtitle}</strong><br>
            <small>Date: ${data.date} | Place: ${config.place}</small></p>
        </div>

        <div class="no-commercial-box">
            <h3>🚫 STRICTLY RESIDENTIAL USE ONLY</h3>
            <p><strong>NO COMMERCIAL • NO GST • NO MSME • NO BUSINESS ACTIVITY</strong></p>
        </div>

        <div class="prohibited-uses">
            <strong>PROHIBITED (INSTANT EVICTION):</strong>
            <ul style="padding-left: 20px; margin: 10px 0;">
                <li>GST/MSME registration against this address</li>
                <li>Online selling/e-commerce operations</li>
                <li>Coaching classes/tuition</li>
                <li>Food delivery/cloud kitchen</li>
                <li>Professional services/office</li>
                <li>PG/hostel operations</li>
            </ul>
        </div>

        <p><strong>LICENSOR:</strong> ${data.licensor_name}<br>
           S/o ${data.licensor_father}<br>
           ${data.licensor_address}<br>
           PAN: ${data.licensor_pan}</p>

        <p><strong>LICENSEE:</strong> ${data.licensee_name}<br>
           S/o ${data.licensor_father}<br>
           Aadhaar: ${data.licensee_aadhaar}</p>

        <p><strong>PROPERTY:</strong> ${data.flat}, ${data.address}</p>

        <table class="print-table">
            <tr><th>License Fee</th><td>₹${data.license_fee}/month</td></tr>
            <tr><th>Deposit</th><td>₹${data.deposit}</td></tr>
        </table>

        <div class="signature-section">
            <table style="width: 100%;">
                <tr>
                    <td style="width:45%; vertical-align:bottom; padding-bottom:50px; border: none;">
                        <strong>LICENSOR</strong><br><span class="fill-line"></span><br>${data.licensor_name}
                    </td>
                    <td style="width:10%"></td>
                    <td style="width:45%; vertical-align:bottom; padding-bottom:50px; border: none;">
                        <strong>LICENSEE</strong><br><span class="fill-line"></span><br>${data.licensee_name}
                    </td>
                </tr>
            </table>
        </div>

        <div style="margin-top:40px; text-align:center; border-top:2px solid #000; padding-top:20px; font-size:10pt;">
            <strong>Register at: ${config.registration}</strong>
        </div>
    `;
}

function printDocument() {
    window.print();
}

function hidePreview() {
    document.getElementById('preview-container').scrollIntoView({ behavior: 'smooth' });
}
</script>

</body>
</html>
