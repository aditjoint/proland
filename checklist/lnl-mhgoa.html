<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave & License - STRICT RESIDENTIAL USE ONLY</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Times New Roman', serif; max-width: 1400px; margin: 0 auto; padding: 20px; background: #f8f9fa; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .state-tabs { display: flex; background: #007bff; border-radius: 8px 8px 0 0; overflow: hidden; margin-bottom: 0; }
        .tab-btn { flex: 1; padding: 15px; background: none; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        .tab-btn.active { background: #0056b3; }
        .tab-content { display: none; padding-top: 20px; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 20px; }
        .form-group h3 { margin-bottom: 10px; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 5px; font-size: 16px; font-family: inherit; margin-bottom: 8px; }
        input:focus, select:focus, textarea:focus { border-color: #007bff; outline: none; box-shadow: 0 0 5px rgba(0,123,255,0.3); }
        .btn { background: #28a745; color: white; padding: 15px 30px; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin: 10px 5px; }
        .btn:hover { background: #218838; }
        .btn-secondary { background: #6c757d; }
        .btn-danger { background: #dc3545; }
        .preview { border: 2px solid #007bff; padding: 20px; margin-top: 20px; background: #f8f9ff; min-height: 500px; overflow-y: auto; }
        .print-area { font-family: 'Times New Roman', serif; font-size: 12pt; line-height: 1.6; }
        .print-header { text-align: center; font-size: 18pt; font-weight: bold; margin-bottom: 30px; page-break-after: avoid; }
        .no-commercial-box { background: #fff3cd; border: 4px solid #ffc107; padding: 20px; margin: 20px 0; border-radius: 8px; }
        .owner-protection-box { background: #e8f5e8; border: 3px solid #28a745; padding: 20px; margin: 20px 0; border-radius: 8px; }
        table.print-table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        table.print-table th, table.print-table td { border: 1px solid #333; padding: 8px; text-align: left; }
        .fill-line { border-bottom: 2px solid #000; min-height: 25px; display: inline-block; width: 100%; margin: 5px 0; }
        .signature-section { margin-top: 60px; page-break-inside: avoid; }
        .prohibited-uses { background: #f8d7da; border-left: 5px solid #dc3545; padding: 15px; margin: 15px 0; }
        .statutory-warning { background: #fff3cd; border-left: 5px solid #ffc107; padding: 15px; margin: 15px 0; font-weight: bold; }
        @media print {
            .container, .form-group, .btn { display: none !important; }
            .print-area { display: block !important; }
            body { background: white; }
        }
        @page { margin: 0.75in; size: A4; }
        .state-safe { border-left: 5px solid #28a745; }
    </style>
</head>
<body>

<div class="container state-safe">
    <h1>🏠 Leave & License - STRICT RESIDENTIAL USE ONLY</h1>
    <p><strong>🚫 NO COMMERCIAL • NO GST • NO MSME • NO STATUTORY BUSINESS USE - IMMEDIATE EVICTION</strong></p>

    <div class="state-tabs">
        <button class="tab-btn active" onclick="switchTab(event, 'maharashtra')">🇲🇭 MAHARASHTRA</button>
        <button class="tab-btn" onclick="switchTab(event, 'gujarat')">🇬🇯 GUJARAT</button>
    </div>

    <!-- MAHARASHTRA FORM -->
    <div id="maharashtra" class="tab-content active">
        <div class="form-group">
            <label>Date of Agreement:</label>
            <input type="date" id="mh_date">
        </div>
        
        <div class="form-group">
            <h3>LICENSOR (OWNER) DETAILS</h3>
            <input type="text" id="mh_licensor_name" placeholder="Full Name">
            <input type="text" id="mh_licensor_father" placeholder="Father's/Spouse's Name">
            <input type="text" id="mh_licensor_address" placeholder="Permanent Address">
            <input type="text" id="mh_licensor_contact" placeholder="Phone/Email">
            <input type="text" id="mh_licensor_pan" placeholder="PAN Number">
        </div>

        <div class="form-group">
            <h3>LICENSEE DETAILS</h3>
            <input type="text" id="mh_licensee_name" placeholder="Full Name">
            <input type="text" id="mh_licensee_father" placeholder="Father's/Spouse's Name">
            <input type="text" id="mh_licensee_address" placeholder="Current Address">
            <input type="text" id="mh_licensee_contact" placeholder="Phone/Email">
            <input type="text" id="mh_licensee_aadhaar" placeholder="Aadhaar Number">
            <input type="text" id="mh_guarantor" placeholder="Guarantor (Optional)">
        </div>

        <div class="form-group">
            <h3>PROPERTY DETAILS</h3>
            <input type="text" id="mh_building" placeholder="Building/Complex">
            <input type="text" id="mh_flat" placeholder="Flat/Apartment No.">
            <input type="text" id="mh_address" placeholder="Complete Address">
            <input type="text" id="mh_area" placeholder="Carpet Area (sq ft)">
            <select id="mh_furnishing">
                <option>Unfurnished</option>
                <option>Semi-Furnished</option>
                <option>Fully Furnished</option>
            </select>
        </div>

        <div class="form-group">
            <h3>TERMS</h3>
            <input type="number" id="mh_license_fee" placeholder="Monthly License Fee (₹)">
            <input type="number" id="mh_deposit" placeholder="Security Deposit (₹)">
            <input type="date" id="mh_start_date">
            <input type="number" id="mh_duration" placeholder="Duration (Months)">
        </div>

        <button class="btn" onclick="generatePreview('maharashtra')">🎨 GENERATE AGREEMENT</button>
        <button class="btn btn-secondary" onclick="clearForm('maharashtra')">🗑️ CLEAR</button>
    </div>

    <!-- GUJARAT FORM (identical structure with gj_ prefix) -->
    <div id="gujarat" class="tab-content">
        <!-- Copy Maharashtra form fields, replace mh_ with gj_ -->
        <button class="btn" onclick="generatePreview('gujarat')">🎨 GENERATE AGREEMENT</button>
    </div>
</div>

<!-- PREVIEW -->
<div class="container preview" id="preview-container" style="display:none;">
    <button class="btn btn-danger" onclick="printDocument()" style="float:right;">🖨️ PRINT TO PDF</button>
    <button class="btn btn-secondary" onclick="hidePreview()">✕ CLOSE</button>
    <div id="print-area" class="print-area"></div>
</div>

<script>
const stateConfig = {
    maharashtra: {
        title: 'MAHARASHTRA RESIDENTIAL LEAVE & LICENSE AGREEMENT',
        subtitle: 'STRICTLY RESIDENTIAL USE - NO COMMERCIAL/GST/MSME/STATUTORY BUSINESS',
        place: 'Mumbai',
        registration: 'https://efilingigr.maharashtra.gov.in'
    },
    gujarat: {
        title: 'GUJARAT RESIDENTIAL LEAVE & LICENSE AGREEMENT', 
        subtitle: 'EXCLUSIVELY RESIDENTIAL - COMMERCIAL USE PROHIBITED',
        place: 'Ahmedabad',
        registration: 'Sub-Registrar Office'
    }
};

function switchTab(event, state) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById(state).classList.add('active');
    event.target.classList.add('active');
}

function clearForm(state) {
    document.querySelectorAll(`#${state} input, #${state} select`).forEach(el => el.value = '');
}

function generatePreview(state) {
    const data = getFormData(state);
    document.getElementById('print-area').innerHTML = generateAgreementHTML(state, data);
    document.getElementById('preview-container').style.display = 'block';
    document.querySelector('.preview').scrollIntoView();
}

function getFormData(state) {
    const prefix = state === 'maharashtra' ? 'mh_' : 'gj_';
    return {
        date: document.getElementById(prefix + 'date')?.value || new Date().toISOString().split('T')[0],
        licensor_name: document.getElementById(prefix + 'licensor_name')?.value || '__________________',
        licensor_father: document.getElementById(prefix + 'licensor_father')?.value || '__________________',
        licensor_address: document.getElementById(prefix + 'licensor_address')?.value || '__________________',
        licensor_pan: document.getElementById(prefix + 'licensor_pan')?.value || '__________________',
        licensee_name: document.getElementById(prefix + 'licensee_name')?.value || '__________________',
        licensee_father: document.getElementById(prefix + 'licensee_father')?.value || '__________________',
        licensee_address: document.getElementById(prefix + 'licensee_address')?.value || '__________________',
        licensee_aadhaar: document.getElementById(prefix + 'licensee_aadhaar')?.value || '__________________',
        building: document.getElementById(prefix + 'building')?.value || '__________________',
        flat: document.getElementById(prefix + 'flat')?.value || '__________________',
        address: document.getElementById(prefix + 'address')?.value || '__________________',
        area: document.getElementById(prefix + 'area')?.value || '__________________',
        furnishing: document.getElementById(prefix + 'furnishing')?.value || '__________________',
        license_fee: document.getElementById(prefix + 'license_fee')?.value || '__________',
        deposit: document.getElementById(prefix + 'deposit')?.value || '__________',
        start_date: document.getElementById(prefix + 'start_date')?.value || '__________',
        duration: document.getElementById(prefix + 'duration')?.value || '__'
    };
}

function generateAgreementHTML(state, data) {
    const config = stateConfig[state];
    
    return `
        <div class="print-header">
            <h1>${config.title}</h1>
            <p><strong>${config.subtitle}</strong><br>
            <small>Date: ${data.date} | Place: ${config.place}</small></p>
        </div>

        <div class="no-commercial-box">
            <h3>🚫 ABSOLUTE PROHIBITION - COMMERCIAL & STATUTORY USE</h3>
            <p><strong>THIS PROPERTY SHALL BE USED STRICTLY FOR PERSONAL RESIDENTIAL PURPOSES ONLY.</strong></p>
            <p>Licensee expressly agrees NOT to use premises for ANY commercial, professional, business, or statutory activity including but not limited to:</p>
        </div>

        <div class="prohibited-uses">
            <strong>🚫 PROHIBITED ACTIVITIES (INSTANT TERMINATION TRIGGER):</strong>
            <ul style="margin: 10px 0; padding-left: 20px;">
                <li>✅ ANY commercial/business activity whatsoever</li>
                <li>✅ GST registration or GST business operations</li>
                <li>✅ MSME/Udyam registration or manufacturing/trading</li>
                <li>✅ Professional services (consultancy, coaching, clinic, office)</li>
                <li>✅ Paying Guest/PG/hostel operations</li>
                <li>✅ Online selling/e-commerce/Amazon/Flipkart operations</li>
                <li>✅ Food delivery/cloud kitchen/Zomato/Swiggy operations</li>
                <li>✅ Tuition/coaching classes/online teaching with students</li>
                <li>✅ Salon/parlour/beauty services</li>
                <li>✅ Any income-generating activity requiring statutory registration</li>
                <li>✅ Storage of commercial goods/inventory</li>
                <li>✅ Receiving commercial deliveries/courier for business</li>
            </ul>
        </div>

        <div class="statutory-warning">
            <strong>⚠️ STATUTORY COMPLIANCE WARNING:</strong><br>
            Licensee shall NOT register this residential premises with ANY statutory authority for commercial purposes including:
            <ul style="margin: 10px 0; padding-left: 20px; font-size: 11pt;">
                <li>GST Authorities (no GSTIN against this address)</li>
                <li>MSME/Udyam Portal (no manufacturing/trading registration)</li>
                <li>Shops & Establishments Act registration</li>
                <li>Professional Tax registration for business</li>
                <li>Labour License or EPF/ESIC registration</li>
                <li>Municipal commercial license</li>
                <li>FSSAI license (food business)</li>
            </ul>
        </div>

        <div class="owner-protection-box">
            <strong>✅ OWNER PROTECTION - COMMERCIAL USE VIOLATION CONSEQUENCES:</strong><br>
            • IMMEDIATE license termination WITHOUT notice<br>
            • FORFEITURE of entire security deposit<br>
            • ₹5,000 per day penalty until vacation<br>
            • Licensee pays ALL statutory penalties/fines<br>
            • Owner recovers legal costs + 24% interest<br>
            • Permanent blacklist from future dealings
        </div>

        <h3>PARTIES</h3>
        <p><strong>LICENSOR:</strong> ${data.licensor_name}, S/o ${data.licensor_father}, ${data.licensor_address}, PAN: ${data.licensor_pan}</p>
        <p><strong>LICENSEE:</strong> ${data.licensee_name}, S/o ${data.licensee_father}, ${data.licensee_address}, Aadhaar: ${data.licensee_aadhaar}</p>

        <h3>LICENSED PREMISES</h3>
        <p>${data.flat}, ${data.building}, ${data.address} (${data.area} sq ft, ${data.furnishing})</p>

        <table class="print-table">
            <tr><th>License Fee</th><td>₹${data.license_fee}/month</td></tr>
            <tr><th>Deposit</th><td>₹${data.deposit} (No interest)</td></tr>
            <tr><th>Period</th><td>${data.duration} months from ${data.start_date}</td></tr>
            <tr><th>PERMITTED USE</th><td><strong>PERSONAL RESIDENTIAL ONLY</strong></td></tr>
        </table>

        <div class="prohibited-uses">
            <h4>Clause 7: RESIDENTIAL USE COVENANT (MATERIAL BREACH)</h4>
            <p><strong>7.1</strong> Licensee covenants that premises shall be used EXCLUSIVELY for personal residence of Licensee and immediate family members only.</p>
            <p><strong>7.2</strong> Licensee gives undertaking that NO commercial/statutory registrations shall be obtained against this premises address.</p>
            <p><strong>7.3</strong> Licensee indemnifies Licensor against ALL statutory notices, penalties, demands arising from commercial misuse.</p>
            <p><strong>7.4 BREACH CONSEQUENCE:</strong> Any commercial/statutory use = AUTOMATIC TERMINATION + FULL FINANCIAL PENALTIES.</p>
        </div>

        <div class="prohibited-uses">
            <h4>Clause 8: VERIFICATION & NON-DENIAL</h4>
            <p>Licensee authorizes Licensor to verify with GST/MSME authorities that no commercial registration exists against premises. Licensee waives privacy objections for such verification.</p>
        </div>

        <!-- Signature Section -->
        <div class="signature-section">
            <table style="width: 100%;">
                <tr>
                    <td style="width:45%; vertical-align:bottom; padding-bottom:50px;">
                        <strong>LICENSOR</strong><br><span class="fill-line"></span><br>${data.licensor_name}
                    </td>
                    <td style="width:10%"></td>
                    <td style="width:45%; vertical-align:bottom; padding-bottom:50px;">
                        <strong>LICENSEE</strong><br><span class="fill-line"></span><br>${data.licensee_name}
                    </td>
                </tr>
            </table>
        </div>

        <div style="margin-top:40px; text-align:center; border-top:2px solid #000; padding-top:20px; font-size:10pt;">
            <strong>Registration: ${config.registration}</strong><br>
            <strong>⚠️ Commercial misuse = IMMEDIATE EVICTION + PENALTIES</strong>
        </div>
    `;
}

function printDocument() { window.print(); }
function hidePreview() { document.getElementById('preview-container').style.display = 'none'; }

document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('input[type="date"]').forEach(input => {
        if (!input.value) input.valueAsDate = new Date();
    });
});
</script>
</body>
</html>
