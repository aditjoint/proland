<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave & License Agreement Generator - PROPERTY OWNER PROTECTED</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Times New Roman', serif; max-width: 1400px; margin: 0 auto; padding: 20px; background: #f8f9fa; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .state-tabs { display: flex; background: #007bff; border-radius: 8px 8px 0 0; overflow: hidden; margin-bottom: 0; }
        .tab-btn { flex: 1; padding: 15px; background: none; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        .tab-btn.active { background: #0056b3; }
        .tab-content { display: none; padding-top: 20px; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 20px; }
        .form-group h3 { margin-bottom: 10px; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 5px; font-size: 16px; font-family: inherit; margin-bottom: 8px; }
        input:focus, select:focus, textarea:focus { border-color: #007bff; outline: none; box-shadow: 0 0 5px rgba(0,123,255,0.3); }
        .checkbox-group { display: flex; align-items: center; margin: 10px 0; }
        .checkbox-group input[type="checkbox"] { width: auto; margin-right: 10px; }
        .btn { background: #28a745; color: white; padding: 15px 30px; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin: 10px 5px; }
        .btn:hover { background: #218838; }
        .btn-secondary { background: #6c757d; }
        .btn-danger { background: #dc3545; }
        .preview { border: 2px solid #007bff; padding: 20px; margin-top: 20px; background: #f8f9ff; min-height: 500px; overflow-y: auto; }
        .print-area { font-family: 'Times New Roman', serif; font-size: 12pt; line-height: 1.6; }
        .print-header { text-align: center; font-size: 18pt; font-weight: bold; margin-bottom: 30px; page-break-after: avoid; }
        .no-tenancy-box { background: #fff5f5; border: 3px solid #dc3545; padding: 20px; margin: 20px 0; border-radius: 8px; }
        .owner-protection-box { background: #e8f5e8; border: 3px solid #28a745; padding: 20px; margin: 20px 0; border-radius: 8px; }
        table.print-table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        table.print-table th, table.print-table td { border: 1px solid #333; padding: 8px; text-align: left; }
        .fill-line { border-bottom: 2px solid #000; min-height: 25px; display: inline-block; width: 100%; margin: 5px 0; }
        .signature-section { margin-top: 60px; page-break-inside: avoid; }
        .protection-highlight { background: #fff3cd; padding: 10px; border-left: 5px solid #ffc107; margin: 15px 0; }
        @media print {
            .container, .form-group, .btn { display: none !important; }
            .print-area { display: block !important; }
            body { background: white; }
        }
        @page { margin: 0.75in; size: A4; }
        .state-safe { border-left: 5px solid #28a745; }
    </style>
</head>
<body>

<div class="container state-safe">
    <h1>🏠 Leave & License Agreement - PROPERTY OWNER PROTECTED</h1>
    <p><strong>✅ 18+ SPECIFIC CLAUSES PROTECTING LANDLORDS • Anti-Tenancy • Damage Recovery • Eviction Powers</strong></p>

    <div class="state-tabs">
        <button class="tab-btn active" onclick="switchTab(event, 'maharashtra')">🇲🇭 MAHARASHTRA</button>
        <button class="tab-btn" onclick="switchTab(event, 'gujarat')">🇬🇯 GUJARAT</button>
    </div>

    <!-- MAHARASHTRA FORM -->
    <div id="maharashtra" class="tab-content active">
        <!-- Same form fields as before - keeping it identical for consistency -->
        <div class="form-group">
            <label>Date of Agreement:</label>
            <input type="date" id="mh_date">
        </div>
        <div class="form-group">
            <h3>LICENSOR DETAILS</h3>
            <input type="text" id="mh_licensor_name" placeholder="Full Name of Licensor">
            <input type="text" id="mh_licensor_father" placeholder="Father's / Spouse's Name">
            <input type="text" id="mh_licensor_address" placeholder="Permanent Address">
            <input type="text" id="mh_licensor_contact" placeholder="Phone / Email">
            <input type="text" id="mh_licensor_id" placeholder="PAN / Aadhaar">
        </div>
        <div class="form-group">
            <h3>LICENSEE DETAILS</h3>
            <input type="text" id="mh_licensee_name" placeholder="Full Name">
            <input type="text" id="mh_licensee_father" placeholder="Father's / Spouse's Name">
            <input type="text" id="mh_licensee_address" placeholder="Current Address">
            <input type="text" id="mh_licensee_contact" placeholder="Phone / Email">
            <input type="text" id="mh_licensee_aadhaar" placeholder="Aadhaar Number">
            <input type="text" id="mh_guarantor" placeholder="Guarantor Name (Optional)">
        </div>
        <div class="form-group">
            <h3>PROPERTY DETAILS</h3>
            <input type="text" id="mh_building" placeholder="Building Name">
            <input type="text" id="mh_flat" placeholder="Flat Number">
            <input type="text" id="mh_address" placeholder="Full Address">
            <input type="text" id="mh_area" placeholder="Area (sq ft)">
            <select id="mh_furnishing">
                <option>Unfurnished</option>
                <option>Semi-Furnished</option>
                <option>Fully Furnished</option>
            </select>
        </div>
        <div class="form-group">
            <h3>FINANCIAL DETAILS</h3>
            <input type="number" id="mh_license_fee" placeholder="Monthly License Fee (₹)">
            <input type="number" id="mh_deposit" placeholder="Security Deposit (₹)">
            <input type="date" id="mh_start_date">
            <input type="number" id="mh_duration_months" placeholder="Duration (Months)">
        </div>
        <button class="btn" onclick="generatePreview('maharashtra')">🎨 GENERATE PROTECTED AGREEMENT</button>
        <button class="btn btn-secondary" onclick="clearForm('maharashtra')">🗑️ CLEAR</button>
    </div>

    <!-- GUJARAT FORM - identical structure -->
    <div id="gujarat" class="tab-content">
        <!-- Identical fields with gj_ prefix - omitted for brevity, copy from MH -->
        <div class="form-group">
            <label>Date of Agreement:</label>
            <input type="date" id="gj_date">
        </div>
        <!-- ... same fields as Maharashtra with gj_ prefix ... -->
        <button class="btn" onclick="generatePreview('gujarat')">🎨 GENERATE PROTECTED AGREEMENT</button>
    </div>
</div>

<!-- PREVIEW AREA -->
<div class="container preview" id="preview-container" style="display:none;">
    <button class="btn btn-danger" onclick="printDocument()" style="float:right;">🖨️ PRINT TO PDF</button>
    <button class="btn btn-secondary" onclick="hidePreview()">✕ CLOSE</button>
    <div id="print-area" class="print-area"></div>
</div>

<script>
const stateConfig = {
    maharashtra: {
        title: 'MAHARASHTRA - RESIDENTIAL LEAVE & LICENSE AGREEMENT (LANDLORD PROTECTED)',
        subtitle: 'Indian Easements Act 1882 • 18+ Owner Protection Clauses • No Tenancy Rights',
        place: 'Mumbai Suburban',
        registration: 'https://efilingigr.maharashtra.gov.in'
    },
    gujarat: {
        title: 'GUJARAT - RESIDENTIAL LEAVE & LICENSE AGREEMENT (LANDLORD PROTECTED)',
        subtitle: 'Indian Easements Act 1882 • Strong Owner Safeguards • No Tenancy',
        place: 'Ahmedabad',
        registration: 'Local Sub-Registrar Office'
    }
};

// All previous functions remain same: switchTab, clearForm, getFormData (update to include all fields)

function generateAgreementHTML(state, data) {
    const config = stateConfig[state];
    
    return `
        <div class="print-header">
            <h1>${config.title}</h1>
            <p><strong>${config.subtitle}</strong><br>
            <small>Executed at ${config.place} on ${data.date}</small></p>
        </div>

        <div class="owner-protection-box">
            <strong>✅ LANDLORD PROTECTION SUMMARY:</strong><br>
            • Legal possession ALWAYS remains with Owner<br>
            • Licensee has NO tenancy/lease rights<br>
            • 18 specific clauses protect property & finances<br>
            • Immediate eviction powers for violations<br>
            • Full damage recovery + penalty provisions
        </div>

        <div class="no-tenancy-box">
            <strong>⚠️ CRITICAL:</strong> This creates ONLY Leave & License. Licensee has ZERO tenancy rights.
        </div>

        <!-- Parties details same as before -->

        <h3>PROPERTY OWNER PROTECTION CLAUSES</h3>

        <div class="protection-highlight">
            <strong>4. OWNER RETAINS FULL LEGAL POSSESSION:</strong> Licensor retains complete legal title, possession and control. Licensee gets only revocable permission to occupy.
        </div>

        <div class="protection-highlight">
            <strong>5. NO TENANCY RIGHTS - ACKNOWLEDGEMENT:</strong> Licensee expressly acknowledges this creates NO tenancy, leasehold interest or rent control protection. Licensee waives any future claim.
        </div>

        <div class="protection-highlight">
            <strong>6. IMMEDIATE TERMINATION RIGHTS:</strong> Licensor may terminate instantly without notice for:<br>
            - Non-payment of license fee (3 days grace)<br>
            - Property damage or unauthorized alterations<br>
            - Illegal/immoral/nuisance activity<br>
            - Sub-letting or unauthorized occupants<br>
            - Society complaints or violations
        </div>

        <div class="protection-highlight">
            <strong>7. DAMAGE LIABILITY - FULL RECOVERY:</strong><br>
            • Licensee liable for ALL damage beyond normal wear<br>
            • Triple deposit forfeiture for willful damage<br>
            • Repair costs + 18% annual interest recoverable<br>
            • Licensor right to enter, repair & recover costs
        </div>

        <table class="print-table">
            <tr><th colspan="2"><strong>FINANCIAL PROTECTIONS</strong></th></tr>
            <tr><td>License Fee</td><td>₹${data.license_fee}/month - Due 5th, 2% monthly late fee</td></tr>
            <tr><td>Security Deposit</td><td>₹${data.deposit} - No interest, full forfeiture rights</td></tr>
            <tr><td>Utility Defaults</td><td>Owner recovers from deposit if unpaid</td></tr>
            <tr><td>Eviction Costs</td><td>Licensee pays all legal costs + 25% penalty</td></tr>
        </table>

        <div class="protection-highlight">
            <strong>8. ENTRY & INSPECTION RIGHTS:</strong> Owner has unrestricted right to enter premises anytime with 24hr notice (instant in emergencies) for inspection, repairs, showing to prospects.
        </div>

        <div class="protection-highlight">
            <strong>9. LIEN ON GOODS:</strong> Licensor has paramount lien on all Licensee goods for unpaid dues. May seize, sell after 15 days notice.
        </div>

        <div class="protection-highlight">
            <strong>10. PERSONAL GUARANTEE (if provided):</strong> ${data.guarantor || 'N/A'} jointly & severally liable for all obligations.
        </div>

        <div class="protection-highlight">
            <strong>11. PROHIBITED ACTIVITIES (BREACH = INSTANT EVICTION):</strong><br>
            ✓ No sub-letting, PG, commercial use<br>
            ✓ No pets without written consent<br>
            ✓ No structural changes<br>
            ✓ No illegal/immoral activities<br>
            ✓ Comply with all society rules
        </div>

        <div class="protection-highlight">
            <strong>12. VACATION OBLIGATIONS:</strong><br>
            • Handover in original condition<br>
            • Professional cleaning certificate<br>
            • All dues cleared with receipts<br>
            • No holdover - ₹3x daily penalty
        </div>

        <div class="protection-highlight">
            <strong>13. SOCIETY COMPLIANCE:</strong> Licensee fully responsible for society rules violations. Owner not liable for complaints/evictions.
        </div>

        <div class="protection-highlight">
            <strong>14. INSURANCE:</strong> Licensee maintains contents insurance. Owner not liable for Licensee property loss.
        </div>

        <h3>EXECUTION & ENFORCEMENT</h3>
        <p><strong>15. JURISDICTION:</strong> Exclusive jurisdiction of courts at ${config.place}. Licensee waives objections.</p>
        <p><strong>16. COSTS:</strong> Licensee bears all stamp duty, registration, legal costs for enforcement.</p>
        <p><strong>17. SEVERABILITY:</strong> Invalid clause doesn't affect others.</p>
        <p><strong>18. ARBITRATION:</strong> Disputes referred to sole arbitrator appointed by Licensor.</p>

        <!-- Signature section same as before -->

        <div style="margin-top: 40px; font-size: 10pt; text-align: center; border-top: 2px solid #000; padding-top: 15px;">
            <strong>Register at: ${config.registration}</strong><br>
            <strong>Stamp Duty: As per state schedule</strong>
        </div>
    `;
}

// Include all previous JavaScript functions: switchTab, clearForm, getFormData, printDocument, etc.
// (Same as previous version - omitted here for brevity)

document.addEventListener('DOMContentLoaded', function() {
    // Auto-fill date
    document.querySelectorAll('input[type="date"]').forEach(input => {
        if (!input.value) input.valueAsDate = new Date();
    });
});
</script>

</body>
</html>
